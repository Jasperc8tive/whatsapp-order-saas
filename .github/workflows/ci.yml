name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  NODE_VERSION: '22'

jobs:
  # Validation job runs on every PR and push
  validate:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x]
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'whatsapp-order-saas/package-lock.json'
      
      - name: Install dependencies
        working-directory: whatsapp-order-saas
        run: npm ci
      
      - name: Lint code
        working-directory: whatsapp-order-saas
        run: npm run lint -- --max-warnings 0
      
      - name: Type check
        working-directory: whatsapp-order-saas
        run: npx tsc --noEmit
      
      - name: Build application
        working-directory: whatsapp-order-saas
        run: npm run build
        env:
          # Use placeholder values for build-time validation
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://example.com' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  
  # Deploy job only runs on push to master
  deploy:
    name: Deploy to Vercel
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Deploy to Vercel
        working-directory: whatsapp-order-saas
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      
      - name: Notify deployment success
        if: success()
        run: echo "✅ Deployment to production completed successfully"
      
      - name: Notify deployment failure
        if: failure()
        run: echo "❌ Deployment to production failed"

  # Security check - runs on PRs
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'whatsapp-order-saas/package-lock.json'
      
      - name: Check npm vulnerabilities
        working-directory: whatsapp-order-saas
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

  # Notification job (optional - requires Slack configuration)
  notify:
    name: Notify on Status
    runs-on: ubuntu-latest
    if: always()
    needs: [validate, deploy]
    
    steps:
      - name: Build Status
        run: |
          if [ "${{ needs.validate.result }}" == "success" ]; then
            echo "✅ Build validation passed"
          else
            echo "⚠️ Build validation had warnings"
          fi
